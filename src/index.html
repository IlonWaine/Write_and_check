<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Email Generator (Writer-Critic)</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center font-sans">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-2xl border border-gray-100">
        <div class="mb-6 text-center">
            <h1 class="text-3xl font-extrabold text-gray-800 tracking-tight">Email creation helper ✍️🧐</h1>
            <p class="text-gray-500 mt-1">Multi-agent Writer & Critic System</p>
        </div>

        <div class="space-y-4">
            <div>
                <label for="prompt" class="block text-sm font-semibold text-gray-700 mb-2">
                    Enter your email details
                </label>
                <textarea 
                    id="prompt" 
                    rows="4" 
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-gray-700 placeholder-gray-400 resize-none transition"
                    placeholder="You can pass your email here, or just email details"
                ></textarea>
            </div>

            <button 
                id="submit-btn"
                onclick="generateEmail()"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl shadow-lg hover:shadow-xl transition flex items-center justify-center space-x-2"
            >
                <span id="btn-text">Generete and check</span>
                <div id="spinner" class="hidden animate-spin rounded-full h-5 w-5 border-2 border-white border-t-transparent"></div>
            </button>
        </div>

        <div class="mt-8 border-t border-gray-200 pt-6">
            <h3 class="text-lg font-bold text-gray-800 mb-3 flex items-center">
                <span>Resulting Email</span>
                <span class="ml-2 text-xs bg-green-100 text-green-800 px-2 py-0.5 rounded-full font-medium">Critically Approved</span>
            </h3>
            
            <div 
                id="result-box" 
                class="w-full min-h-[150px] bg-gray-50 border border-gray-200 rounded-xl p-4 text-gray-700 whitespace-pre-wrap selection:bg-blue-100"
            >Here would be viewed final result approved by critic agent</div>
        </div>
    </div>

    <script>
        async function generateEmail() {
            const promptInput = document.getElementById('prompt');
            const resultBox = document.getElementById('result-box');
            const submitBtn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const spinner = document.getElementById('spinner');

            const text = promptInput.value.trim();
            if (!text) {
                alert("Будь ласка, введіть деталі листа!");
                return;
            }

            // Включаємо стан завантаження (блокуємо кнопку, показуємо спіннер)
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-75', 'cursor-not-allowed');
            btnText.innerText = "Агенти ведуть дискусію...";
            spinner.classList.remove('hidden');
            resultBox.innerText = "Письменник складає чернетку, а Критик готує зауваження. Зачекайте...";
            resultBox.classList.add('text-gray-400', 'italic');

            try {
                // Робимо POST запит до нашого FastAPI серверу
                const response = await fetch('/api/generate-email', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ prompt: text })
                });

                const data = await response.json();

                if (response.ok) {
                    // Виводимо фінальний текст
                    resultBox.innerText = data.result;
                    resultBox.classList.remove('text-gray-400', 'italic');
                } else {
                    resultBox.innerText = `Помилка: ${data.detail || "Щось пішло не так"}`;
                }

            } catch (error) {
                resultBox.innerText = `Не вдалося зв'язатися з сервером: ${error.message}`;
            } finally {
                // Повертаємо кнопку в початковий стан
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-75', 'cursor-not-allowed');
                btnText.innerText = "Згенерувати ідеальний лист";
                spinner.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
